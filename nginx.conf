# Omit 'user' directive — required when the process does not start as root.
# In the Docker image the nginx worker runs as uid 101 (nginx user).
worker_processes auto;

# /tmp is writable by any user; keeps the non-root setup clean.
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Temp paths that must be writable by the nginx user
    client_body_temp_path /tmp/nginx/client;
    proxy_temp_path        /tmp/nginx/proxy;
    fastcgi_temp_path      /tmp/nginx/fastcgi;
    uwsgi_temp_path        /tmp/nginx/uwsgi;
    scgi_temp_path         /tmp/nginx/scgi;

    sendfile           on;
    keepalive_timeout  65;

    # Hide nginx version from response headers
    server_tokens off;

    # Gzip — compresses JS/CSS/JSON in transit
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    server {
        listen 8080;
        root   /usr/share/nginx/html;
        index  index.html;

        # ── SPA routing ─────────────────────────────────────────────────────
        # All paths that don't map to a real file fall back to index.html so
        # React Router can handle client-side navigation.
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── index.html: never cache ──────────────────────────────────────────
        # The browser must always fetch the latest shell so it picks up new
        # hashed asset filenames on every deploy.
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma        "no-cache"                            always;
            expires 0;
        }

        # ── Hashed static assets: cache forever ─────────────────────────────
        # Vite appends a content hash to every JS/CSS filename (e.g.
        # main.a1b2c3d4.js). A changed file gets a new name, so it is safe to
        # instruct browsers and CDNs to cache these indefinitely.
        location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }

        # ── Security headers ─────────────────────────────────────────────────
        add_header X-Frame-Options           "SAMEORIGIN"                    always;
        add_header X-Content-Type-Options    "nosniff"                       always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    }
}
