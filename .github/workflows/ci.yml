name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Type check · Lint · Test · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Quality gates ──────────────────────────────────────────────────────

      - name: Type check
        run: npx tsc -b --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit & integration tests
        run: npm test

      # ── Build ──────────────────────────────────────────────────────────────

      - name: Build
        run: npm run build
        env:
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_APP_ENV: production
          VITE_APP_VERSION: ${{ github.sha }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7

      # ── Storybook ──────────────────────────────────────────────────────────
      # Catches broken stories (component API drift) that unit tests may miss.

      - name: Build Storybook
        run: npm run build-storybook

      # ── Security ───────────────────────────────────────────────────────────
      # Fails the job on critical vulnerabilities in production dependencies.
      # Use --audit-level=high to catch high-severity issues too.

      - name: Dependency vulnerability scan
        run: npm audit --audit-level=critical --omit=dev

  # ── Worker (share-api) ─────────────────────────────────────────────────────
  # The Cloudflare Worker has its own deps/tsconfig; typecheck it and validate
  # the deploy config (dry-run) so Worker regressions are caught in CI too.
  worker:
    name: Worker · typecheck + deploy dry-run
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/share-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: workers/share-api/package-lock.json

      - name: Install worker dependencies
        run: npm ci

      - name: Type check worker
        run: npm run typecheck

      - name: Validate deploy config (dry-run)
        run: |
          cp wrangler.toml.example wrangler.toml
          npx wrangler deploy --dry-run
